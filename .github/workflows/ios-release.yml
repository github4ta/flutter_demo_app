name: Flutter iOS Build

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Force Generate iOS Files
        run: flutter build ios --config-only --no-codesign

      - name: Install CocoaPods
        run: |
          if [ -f "ios/Podfile" ]; then
            cd ios
            pod install
          else
            echo "No Podfile found, skipping pod install (this is normal for simple apps)"
          fi

      - name: Force Generate Configs
        run: flutter build ios --config-only --release --no-codesign

      - name: Build iOS (.app)
        run: flutter build ios --simulator --no-codesign

      - name: Archive Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphonesimulator/Runner.app
